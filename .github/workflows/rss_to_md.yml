name: Generate Markdown from RSS Feed

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every 24 hours

jobs:
  generate_md:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xmltodict

      - name: Generate Markdown files
        id: generate_md
        run: |
          import os
          import xmltodict
          from datetime import datetime

          # Load and parse the XML file
          with open('posts/rss_feed.xml') as xml_file:
              rss_content = xmltodict.parse(xml_file.read())

          items = rss_content['rss']['channel']['item']

          # Ensure _posts directory exists
          os.makedirs('_posts', exist_ok=True)

          # Create Markdown files for each item
          for item in items:
              title = item['title'].replace(" ", "-").lower()
              pub_date = datetime.strptime(item['pubDate'], '%Y-%m-%d %H:%M:%S')
              filename = f"_posts/{pub_date.strftime('%Y-%m-%d')}-{title}.md"

              md_content = f"""---
layout: post
title: {item['title']}
date: {pub_date.strftime('%Y-%m-%d %H:%M:%S')}
description: {item['description']}
redirect: {item['link']}
---
"""

              # Check if the file already exists to avoid overwriting
              if not os.path.exists(filename):
                  with open(filename, 'w') as md_file:
                      md_file.write(md_content)

      - name: Commit new Markdown files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add --all
          git diff --cached --exit-code || git commit -m "Add new Markdown files from RSS feed"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
