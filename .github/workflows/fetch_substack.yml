name: Fetch Substack Posts

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC

jobs:
  fetch-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16' # You can specify the version you need

      - name: Install RSS Fetcher
        run: npm install rss-parser

      - name: Fetch Substack RSS
        run: |
          const Parser = require('rss-parser');
          const parser = new Parser();
          const fs = require('fs');
          const path = require('path');

          const feedUrl = 'https://kavinpalanichamy.substack.com/feed'; // Replace with your RSS feed URL
          const postsDir = './posts'; // Directory to save posts
          const fetchedPosts = [];

          const fetchPosts = async () => {
            const feed = await parser.parseURL(feedUrl);
            feed.items.forEach(item => {
              const fileName = `${item.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.md`;
              const filePath = path.join(postsDir, fileName);
              if (!fs.existsSync(filePath)) {
                const content = `# ${item.title}\n\n${item.content}\n\n[Read more](${item.link})`;
                fs.writeFileSync(filePath, content);
                fetchedPosts.push(fileName);
              }
            });
          };

          fetchPosts().then(() => {
            if (fetchedPosts.length > 0) {
              console.log('New posts added:', fetchedPosts);
            } else {
              console.log('No new posts found.');
            }
          }).catch(err => console.error(err));
        env:
          NODE_OPTIONS: --no-warnings
          
      - name: Commit New Posts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add posts/*
          git commit -m "Add new Substack posts" || echo "No changes to commit"
          git push
