name: Fetch Substack Posts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  fetch-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Verify Feed URL
        run: |
          FEED_URL="https://kavinpalanichamy.substack.com/feed"
          echo "Checking feed URL: $FEED_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "SubstackFetcher/1.0 (GitHub Actions)" "$FEED_URL")
          echo "Feed URL status code: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Error: Feed URL returned status $STATUS"
            curl -v "$FEED_URL"
            exit 1
          fi

      - name: Install Dependencies
        run: npm install rss-parser

      - name: Create Posts Directory
        run: mkdir -p posts

      - name: Fetch Substack RSS
        run: |
          echo "Node.js version: $(node --version)"
          echo "NPM version: $(npm --version)"
          node .github/scripts/fetch-posts.js
        env:
          NODE_OPTIONS: --no-warnings
          DEBUG: "rss-parser:*"

      - name: Commit New Posts
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add posts/
          git diff --staged --quiet || (git commit -m "Add new Substack posts" && git push)