name: Fetch RSS Feed

on:
  schedule:
    - cron: '0 * * * *'  # This schedule runs every hour. Adjust as needed.
  workflow_dispatch:  # Allows you to manually trigger the workflow.

jobs:
  fetch_rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Fetch RSS Feed
        id: fetch_rss
        run: |
          RSS_URL="https://kavinpalanichamy.substack.com"  # Replace with your RSS feed URL.
          curl -s "$RSS_URL" -o rss_feed.xml
          echo "RSS feed fetched successfully."

      - name: Save RSS Feed to file
        run: |
          echo "Saving RSS feed to repository..."
          mv rss_feed.xml ./rss_feed.xml
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./rss_feed.xml
          git commit -m "Update RSS feed"
          git push
