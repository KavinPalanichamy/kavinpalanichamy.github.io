name: Fetch RSS Feed

on:
  schedule:
    - cron: '0 */2 * * *'  # Run every 2 hours instead of every hour
  workflow_dispatch:

jobs:
  fetch_rss:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install Chrome and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          python -m pip install --upgrade pip
          pip install selenium requests feedparser webdriver_manager
        
      - name: Create posts directory
        run: mkdir -p posts
        
      - name: Fetch RSS Feed
        id: fetch_rss
        run: |
          cat > fetch_feed.py << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import time
          import requests
          import feedparser
          
          def get_substack_feed():
              chrome_options = Options()
              chrome_options.add_argument('--headless')
              chrome_options.add_argument('--no-sandbox')
              chrome_options.add_argument('--disable-dev-shm-usage')
              chrome_options.add_argument('--disable-gpu')
              chrome_options.add_argument('--window-size=1920x1080')
              chrome_options.add_argument('--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36')
              
              service = Service('/usr/bin/chromedriver')
              driver = webdriver.Chrome(service=service, options=chrome_options)
              
              try:
                  # First visit the main page to get cookies
                  driver.get('https://kavinpalanichamy.substack.com')
                  time.sleep(5)  # Wait for any JavaScript to load
                  
                  # Now try to get the RSS feed
                  driver.get('https://kavinpalanichamy.substack.com/feed')
                  time.sleep(5)
                  
                  # Get the page source
                  page_source = driver.page_source
                  
                  # If we got XML content, save it
                  if '<?xml' in page_source or '<rss' in page_source:
                      with open('posts/rss_feed.xml', 'w', encoding='utf-8') as f:
                          f.write(page_source)
                      print("Successfully fetched and saved RSS feed")
                      return True
                  else:
                      print("Did not receive valid RSS content")
                      return False
                      
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return False
                  
              finally:
                  driver.quit()
          
          # Run the fetch
          success = get_substack_feed()
          exit(0 if success else 1)
          EOF
          
          python fetch_feed.py
        
      - name: Commit and push changes
        if: success()
        run: |
          if [ -f posts/rss_feed.xml ] && [ -s posts/rss_feed.xml ]; then
            if ! git diff --quiet posts/rss_feed.xml; then
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add posts/rss_feed.xml
              git commit -m "Update RSS feed [skip ci]"
              git push
            else
              echo "No changes to RSS feed"
            fi
          else
            echo "RSS feed file is missing or empty"
            exit 1
          fi
